<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#f0ebe3"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1c1a17" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <radialGradient id="spotlight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2a6049" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f0ebe3" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#spotlight)"/>

  <!-- Logo mark -->
  <rect x="80" y="72" width="56" height="56" rx="14" fill="#2a6049"/>
  <path d="M96 88 L106 88 L118 112 L128 112" stroke="#f0ebe3" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M128 88 L118 88 L106 112 L96 112" stroke="#f0ebe3" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <circle cx="112" cy="100" r="4" fill="#f0ebe3"/>

  <!-- NEXUS wordmark -->
  <text x="152" y="112" font-family="Georgia, serif" font-size="36" font-weight="700" fill="#1c1a17" letter-spacing="6">NEXUS</text>

  <!-- Badge -->
  <rect x="80" y="160" width="220" height="32" rx="16" fill="#2a6049" fill-opacity="0.1" stroke="#2a6049" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="100" cy="176" r="4" fill="#2a6049"/>
  <text x="114" y="181" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#2a6049" letter-spacing="2">BUILT ON GENLAYER</text>

  <!-- Main headline -->
  <text x="80" y="290" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#1c1a17">Code Audits.</text>
  <text x="80" y="380" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#2a6049">Verifiable. Permanent.</text>

  <!-- Subline -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="24" fill="#1c1a17" opacity="0.55">AI validators independently fetch, analyze, and reach consensus.</text>
  <text x="80" y="484" font-family="Arial, sans-serif" font-size="24" fill="#1c1a17" opacity="0.55">Audit results stored permanently onchain.</text>

  <!-- Verdict badges -->
  <rect x="80" y="540" width="100" height="36" rx="8" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="130" y="563" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#065f46" text-anchor="middle">✓ PASS</text>

  <rect x="196" y="540" width="100" height="36" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="246" y="563" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#991b1b" text-anchor="middle">✗ FAIL</text>

  <rect x="312" y="540" width="150" height="36" rx="8" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="387" y="563" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">◎ NEEDS REVIEW</text>

  <!-- Right side decorative -->
  <rect x="780" y="80" width="340" height="480" rx="20" fill="#f7f4ef" stroke="#ddd8ce" stroke-width="1.5"/>
  <rect x="800" y="100" width="300" height="60" rx="10" fill="#2a6049" fill-opacity="0.08"/>
  <text x="950" y="135" font-family="Arial, sans-serif" font-size="13" fill="#2a6049" text-anchor="middle" font-weight="600">github.com/user/my-protocol</text>

  <text x="800" y="200" font-family="Arial, sans-serif" font-size="12" fill="#1c1a17" opacity="0.4" font-weight="600">CLAIM</text>
  <text x="800" y="222" font-family="Arial, sans-serif" font-size="14" fill="#1c1a17" opacity="0.7">"This contract has no reentrancy</text>
  <text x="800" y="242" font-family="Arial, sans-serif" font-size="14" fill="#1c1a17" opacity="0.7">vulnerabilities."</text>

  <line x1="800" y1="270" x2="1100" y2="270" stroke="#ddd8ce" stroke-width="1"/>

  <text x="800" y="300" font-family="Arial, sans-serif" font-size="12" fill="#1c1a17" opacity="0.4" font-weight="600">VERDICT</text>
  <rect x="800" y="312" width="90" height="28" rx="6" fill="#d1fae5" stroke="#6ee7b7" stroke-width="1"/>
  <text x="845" y="331" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">PASS</text>

  <text x="800" y="380" font-family="Arial, sans-serif" font-size="12" fill="#1c1a17" opacity="0.4" font-weight="600">RISK SCORE</text>
  <rect x="800" y="392" width="300" height="8" rx="4" fill="#ddd8ce"/>
  <rect x="800" y="392" width="60" height="8" rx="4" fill="#2a6049"/>
  <text x="870" y="403" font-family="Arial, sans-serif" font-size="12" fill="#2a6049" font-weight="700">2/10</text>

  <text x="800" y="440" font-family="Arial, sans-serif" font-size="12" fill="#1c1a17" opacity="0.4" font-weight="600">FINDINGS</text>
  <text x="800" y="462" font-family="Arial, sans-serif" font-size="13" fill="#1c1a17" opacity="0.6">· README is thorough and detailed</text>
  <text x="800" y="482" font-family="Arial, sans-serif" font-size="13" fill="#1c1a17" opacity="0.6">· No unsafe external calls found</text>
  <text x="800" y="502" font-family="Arial, sans-serif" font-size="13" fill="#1c1a17" opacity="0.6">· Access control properly implemented</text>

  <rect x="800" y="520" width="300" height="1" fill="#ddd8ce"/>
  <text x="950" y="548" font-family="Arial, sans-serif" font-size="11" fill="#2a6049" text-anchor="middle" opacity="0.7">nexus-genlayer.vercel.app</text>
</svg>
